version: 1.0.0 # 插件版本号。格式：1.1.1 或者 1.1
author: Shtraiy # 作者
repo: https://github.com/Shtraiy/astrbot_plugin_filter # 插件的仓库地址
astrbot_version: ">=4.16,<5" # 兼容的 AstrBot 版本范围
